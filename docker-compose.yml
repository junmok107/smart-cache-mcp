services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smart-cache-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - smart-cache-net

  embedding-service:
    build:
      context: ./embedding-service
      dockerfile: Dockerfile
    container_name: smart-cache-embedding
    restart: unless-stopped
    environment:
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE}
    ports:
      - "${EMBEDDING_SERVICE_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 5s
      timeout: 5s
      retries: 10
    # GPU access (RTX 3060) via NVIDIA Container Toolkit
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - smart-cache-net

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: smart-cache-mcp-server
    restart: unless-stopped
    # host.docker.internal is provided automatically by Docker Desktop
    # (Windows/Mac) but NOT by Linux Docker (e.g. GitHub Actions runners)
    # unless explicitly mapped — this makes it resolve everywhere. Needed
    # so mcp-server can reach host-run downstream MCP fixtures in tests.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: ${NODE_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      MCP_SERVER_PORT: ${MCP_SERVER_PORT}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
      DATABASE_URL: ${DATABASE_URL}
      EMBEDDING_SERVICE_URL: ${EMBEDDING_SERVICE_URL}
      CACHE_SIMILARITY_THRESHOLD: ${CACHE_SIMILARITY_THRESHOLD}
      CACHE_MAX_ENTRIES: ${CACHE_MAX_ENTRIES}
      CACHE_MAX_SIZE_MB: ${CACHE_MAX_SIZE_MB}
      CACHE_TTL_IMPORTANCE_1: ${CACHE_TTL_IMPORTANCE_1}
      CACHE_TTL_IMPORTANCE_2: ${CACHE_TTL_IMPORTANCE_2}
      CACHE_TTL_IMPORTANCE_3: ${CACHE_TTL_IMPORTANCE_3}
      CACHE_TTL_IMPORTANCE_4: ${CACHE_TTL_IMPORTANCE_4}
      CACHE_TTL_IMPORTANCE_5: ${CACHE_TTL_IMPORTANCE_5}
    ports:
      - "${MCP_SERVER_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      embedding-service:
        condition: service_healthy
    networks:
      - smart-cache-net

networks:
  smart-cache-net:
    driver: bridge

volumes:
  postgres-data:
